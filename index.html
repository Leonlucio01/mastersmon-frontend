<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mastersmon</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <img src="img/Logo MastersMon.png" class="logo" alt="Mastersmon" />
        <div class="brand-copy">
          <strong>Mastersmon</strong>
          <small>Trainer Hub</small>
        </div>
      </div>

      <nav class="nav">
        <button data-nav="home" class="active" type="button">Home</button>
        <button data-nav="adventure" type="button">Adventure</button>
      </nav>

      <div class="topbar-actions">
        <select id="languageSwitch" aria-label="Idioma">
          <option value="es">ES</option>
          <option value="en">EN</option>
        </select>
        <button id="refreshBtn" type="button">Refresh</button>
        <button id="logoutBtn" type="button" class="hidden">Salir</button>
      </div>
    </header>

    <section id="authMount" class="auth-mount hidden">
      <div class="auth-card">
        <span class="eyebrow">Google Sign-In</span>
        <h2>Inicia sesión para entrar al juego</h2>
        <p>Esta base ya conecta con la API real del backend para sesión, Home y Adventure.</p>

        <div id="g_id_onload"
             data-client_id="REEMPLAZA_CON_TU_GOOGLE_CLIENT_ID"
             data-callback="handleCredentialResponse">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-size="large"
             data-theme="outline"
             data-text="signin_with"
             data-shape="pill"
             data-logo_alignment="left">
        </div>

        <div id="loginStatus"></div>
      </div>
    </section>

    <main id="content"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>\n
