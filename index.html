<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mastersmon</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <img src="img/Logo MastersMon.png" class="logo" alt="Mastersmon" />
        <strong>Mastersmon</strong>
      </div>

      <nav>
        <button data-nav="home" class="active" type="button">Home</button>
        <button data-nav="adventure" type="button">Adventure</button>
      </nav>

      <div class="auth-box">
        <div id="g_id_onload"
             data-client_id="REEMPLAZA_CON_TU_GOOGLE_CLIENT_ID"
             data-callback="handleCredentialResponse">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-size="medium"
             data-theme="outline"
             data-text="signin_with"
             data-shape="pill"
             data-logo_alignment="left">
        </div>

        <div id="userBox" class="hidden">
          <span id="userName"></span>
          <button id="logoutBtn" type="button">Logout</button>
        </div>
      </div>
    </header>

    <main id="content"></main>
  </div>

  <script src="app.js"></script>
</body>
</html>
