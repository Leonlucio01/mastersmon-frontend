<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastersmon - Pokedex</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/pokemon.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <!-- HEADER -->
    <header class="menu menu-pro">
        <div class="menu-topbar">
            <h1 class="logo">Mastersmon</h1>

            <nav class="menu-nav-desktop">
                <a href="index.html" class="active" data-i18n="menu_pokedex">Pokedex</a>
                <a href="battle.html" data-i18n="menu_play">Play</a>
                <a href="mypokemon.html" data-i18n="menu_collection">Collection</a>
                <a href="pokemart.html" data-i18n="menu_shop">Shop</a>
                <a href="ranking.html" data-i18n="menu_ranking">Ranking</a>
                <a href="#" class="menu-disabled" data-i18n="menu_more" onclick="return false;" aria-disabled="true">More</a>
            </nav>

            <div class="menu-auth-area">
                <div class="lang-switch">
                    <select id="languageSelect" aria-label="Language">
                        <option value="en">EN</option>
                        <option value="es">ES</option>
                    </select>
                </div>

                <div id="loginMenuContainer">
                    <div id="g_id_onload"
                         data-client_id="535230935122-vqqd262fjhetd408li95420bb8cas5vb.apps.googleusercontent.com"
                         data-callback="handleCredentialResponse">
                    </div>

                    <div class="g_id_signin"
                         data-type="standard"
                         data-size="medium"
                         data-theme="outline"
                         data-text="signin_with"
                         data-shape="pill"
                         data-logo_alignment="left">
                    </div>
                </div>

                <div id="usuarioMenu" class="oculto">
                    <span id="nombreUsuario"></span>
                    <button id="cerrarSesionMenu" type="button" data-i18n="menu_logout">Logout</button>
                </div>
            </div>

            <button class="menu-toggle" id="menuToggle" type="button" aria-label="Open menu">☰</button>
        </div>

        <div class="menu-links-mobile" id="menuMobile">
            <div class="mobile-panel">
                <a href="index.html" class="active" data-i18n="menu_pokedex">Pokedex</a>
                <a href="battle.html" data-i18n="menu_play">Play</a>
                <a href="mypokemon.html" data-i18n="menu_collection">Collection</a>
                <a href="pokemart.html" data-i18n="menu_shop">Shop</a>
                <a href="ranking.html" data-i18n="menu_ranking">Ranking</a>
                <a href="#" class="menu-disabled" data-i18n="menu_more" onclick="return false;" aria-disabled="true">More</a>

                <div class="menu-mobile-user">
                    <div class="lang-switch">
                        <select id="languageSelectMobile" aria-label="Language">
                            <option value="en">EN</option>
                            <option value="es">ES</option>
                        </select>
                    </div>

                    <div id="loginMenuContainerMobile">
                        <div class="g_id_signin"
                             data-type="standard"
                             data-size="medium"
                             data-theme="outline"
                             data-text="signin_with"
                             data-shape="pill"
                             data-logo_alignment="left">
                        </div>
                    </div>

                    <div id="usuarioMenuMobile" class="oculto">
                        <span id="nombreUsuarioMobile"></span>
                        <button id="cerrarSesionMenuMobile" type="button" data-i18n="menu_logout">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="banner">
        <img src="img/Banner.png" alt="Pokemon Banner">
    </section>

    <section class="seccion-pokedex">
        <div class="encabezado-pokedex">
            <h2 class="titulo" data-i18n="pokedex_title">POKEDEX</h2>
            <p class="subtitulo" data-i18n="pokedex_subtitle">Explore, search, and filter your favorite Pokémon</p>
        </div>

        <div class="filtros">
            <input
                type="text"
                id="buscarPokemon"
                placeholder="🔎 Search Pokémon..."
                data-i18n-placeholder="pokedex_search_placeholder"
            >

            <select id="filtroTipo">
                <option value="" data-i18n="type_all">All types</option>
                <option value="Normal" data-i18n="type_normal">Normal</option>
                <option value="Fuego" data-i18n="type_fire">Fire</option>
                <option value="Agua" data-i18n="type_water">Water</option>
                <option value="Planta" data-i18n="type_grass">Grass</option>
                <option value="Electrico" data-i18n="type_electric">Electric</option>
                <option value="Hielo" data-i18n="type_ice">Ice</option>
                <option value="Lucha" data-i18n="type_fighting">Fighting</option>
                <option value="Veneno" data-i18n="type_poison">Poison</option>
                <option value="Tierra" data-i18n="type_ground">Ground</option>
                <option value="Volador" data-i18n="type_flying">Flying</option>
                <option value="Psiquico" data-i18n="type_psychic">Psychic</option>
                <option value="Bicho" data-i18n="type_bug">Bug</option>
                <option value="Roca" data-i18n="type_rock">Rock</option>
                <option value="Fantasma" data-i18n="type_ghost">Ghost</option>
                <option value="Dragon" data-i18n="type_dragon">Dragon</option>
                <option value="Acero" data-i18n="type_steel">Steel</option>
                <option value="Hada" data-i18n="type_fairy">Fairy</option>
            </select>

            <button id="modoShiny" type="button">✨ Shiny</button>
        </div>

        <div id="pokedex"></div>
    </section>

    <div id="detallePokemon" class="modal oculto">
        <div class="modal-content">
            <span class="cerrar" onclick="cerrarDetalle()">✖</span>
            <div id="contenidoDetalle"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/pokemon.js"></script>
    <script src="js/gmail.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
