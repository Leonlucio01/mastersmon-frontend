<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon World - Pokedex</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/pokemon.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <!-- HEADER -->
    <header class="menu menu-pro">
        <div class="menu-topbar">
            <h1 class="logo">Pokemon World</h1>

            <nav class="menu-nav-desktop">
                <a href="index.html" class="active" data-i18n="menu_pokedex">Pokedex</a>
                <a href="battle.html" data-i18n="menu_battle">Battle</a>
                <a href="maps.html" data-i18n="menu_maps">Maps</a>
                <a href="mypokemon.html" data-i18n="menu_my_pokemon">My Pokemon</a>
                <a href="pokemart.html" data-i18n="menu_pokemart">PokeMart</a>
            </nav>

            <div class="menu-auth-area">
                <div class="lang-switch">
                    <select id="languageSelect">
                        <option value="en">EN</option>
                        <option value="es">ES</option>
                    </select>
                </div>

                <div id="loginMenuContainer">
                    <div id="g_id_onload"
                         data-client_id="535230935122-vqqd262fjhetd408li95420bb8cas5vb.apps.googleusercontent.com"
                         data-callback="handleCredentialResponse">
                    </div>

                    <div class="g_id_signin"
                         data-type="standard"
                         data-size="medium"
                         data-theme="outline"
                         data-text="signin_with"
                         data-shape="pill"
                         data-logo_alignment="left">
                    </div>
                </div>

                <div id="usuarioMenu" class="oculto">
                    <span id="nombreUsuario"></span>
                    <button id="cerrarSesionMenu" type="button" data-i18n="menu_logout">Logout</button>
                </div>
            </div>

            <button class="menu-toggle" id="menuToggle" type="button">☰</button>
        </div>

        <div class="menu-links-mobile" id="menuMobile">
            <div class="mobile-panel">
                <a href="index.html" class="active" data-i18n="menu_pokedex">Pokedex</a>
                <a href="battle.html" data-i18n="menu_battle">Battle</a>
                <a href="maps.html" data-i18n="menu_maps">Maps</a>
                <a href="mypokemon.html" data-i18n="menu_my_pokemon">My Pokemon</a>
                <a href="pokemart.html" data-i18n="menu_pokemart">PokeMart</a>

                <div class="menu-mobile-user">
                    <div id="loginMenuContainerMobile">
                        <div class="g_id_signin"
                             data-type="standard"
                             data-size="medium"
                             data-theme="outline"
                             data-text="signin_with"
                             data-shape="pill"
                             data-logo_alignment="left">
                        </div>
                    </div>

                    <div id="usuarioMenuMobile" class="oculto">
                        <span id="nombreUsuarioMobile"></span>
                        <button id="cerrarSesionMenuMobile" type="button" data-i18n="menu_logout">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="banner">
        <img src="img/Banner.png" alt="Pokemon Banner">
    </section>

    <section class="seccion-pokedex">
        <div class="encabezado-pokedex">
            <h2 class="titulo" data-i18n="pokedex_title">POKEDEX</h2>
            <p class="subtitulo" data-i18n="pokedex_subtitle">Explore, search, and filter your favorite Pokémon</p>
        </div>

        <div class="filtros">
            <input
                type="text"
                id="buscarPokemon"
                placeholder="🔎 Search Pokémon..."
                data-i18n-placeholder="pokedex_search_placeholder"
            >

            <select id="filtroTipo">
                <option value="" data-i18n="pokedex_all_types">All types</option>
                <option value="Normal">Normal</option>
                <option value="Fuego">Fuego</option>
                <option value="Agua">Agua</option>
                <option value="Planta">Planta</option>
                <option value="Electrico">Eléctrico</option>
                <option value="Hielo">Hielo</option>
                <option value="Lucha">Lucha</option>
                <option value="Veneno">Veneno</option>
                <option value="Tierra">Tierra</option>
                <option value="Volador">Volador</option>
                <option value="Psiquico">Psíquico</option>
                <option value="Bicho">Bicho</option>
                <option value="Roca">Roca</option>
                <option value="Fantasma">Fantasma</option>
                <option value="Dragon">Dragón</option>
                <option value="Acero">Acero</option>
                <option value="Hada">Hada</option>
            </select>

            <button id="modoShiny" type="button">✨ Shiny</button>
        </div>

        <div id="pokedex"></div>
    </section>

    <div id="detallePokemon" class="modal oculto">
        <div class="modal-content">
            <span class="cerrar" onclick="cerrarDetalle()">✖</span>
            <div id="contenidoDetalle"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/pokemon.js"></script>
    <script src="js/gmail.js"></script>
    <script src="js/app.js"></script>
    <script>
        const menuToggle = document.getElementById("menuToggle");
        const menuMobile = document.getElementById("menuMobile");

        if (menuToggle && menuMobile) {
            menuToggle.addEventListener("click", () => {
                menuMobile.classList.toggle("menu-open");
            });
        }

        const languageSelect = document.getElementById("languageSelect");

        if (languageSelect && typeof getCurrentLang === "function") {
            languageSelect.value = getCurrentLang();

            languageSelect.addEventListener("change", (e) => {
                setCurrentLang(e.target.value);
            });
        }

        if (typeof applyTranslations === "function") {
            applyTranslations();
        }
    </script>

</body>
</html>
