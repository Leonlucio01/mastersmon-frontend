<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mastersmon V2 Modular</title>
  <meta name="description" content="Mastersmon V2 modular: shell, auth, onboarding, home y adventure.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/shell.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/adventure.css">
  <link rel="stylesheet" href="css/collection.css">
  <link rel="stylesheet" href="css/team.css">
  <link rel="stylesheet" href="css/gyms.css">
  <link rel="stylesheet" href="css/house.css">
  <link rel="stylesheet" href="css/trade.css">
  <link rel="stylesheet" href="css/shop.css">
  <link rel="stylesheet" href="css/ranking.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="shell-bg shell-bg-top"></div>
  <div class="shell-bg shell-bg-bottom"></div>

  <div id="app" class="app-shell">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Mastersmon V2">
        <span class="brand-mark">M</span>
        <span class="brand-copy">
          <strong>Mastersmon</strong>
          <small>V2 Modular</small>
        </span>
      </a>

      <div class="topnav-shell">
        <nav class="topnav" aria-label="Principal">
          <button class="topnav-link is-active" type="button" data-nav="home">Home</button>
          <button class="topnav-link" type="button" data-nav="adventure">Adventure</button>
          <button class="topnav-link" type="button" data-nav="collection">Collection</button>
          <button class="topnav-link" type="button" data-nav="team">Team</button>
          <button class="topnav-link" type="button" data-nav="gyms">Gyms</button>
        </nav>
        <details class="topnav-more">
          <summary class="topnav-link">More</summary>
          <div class="topnav-more-menu">
            <button class="topnav-link topnav-link-sub" type="button" data-nav="house">House</button>
            <button class="topnav-link topnav-link-sub" type="button" data-nav="trade">Trade</button>
            <button class="topnav-link topnav-link-sub" type="button" data-nav="shop">Shop</button>
            <button class="topnav-link topnav-link-sub" type="button" data-nav="ranking">Ranking</button>
          </div>
        </details>
      </div>

      <div class="topbar-actions">
        <label class="language-switch" for="languageSwitch">
          <span>Lang</span>
          <select id="languageSwitch" aria-label="Language">
            <option value="en">EN</option>
            <option value="es">ES</option>
          </select>
        </label>
        <div id="topbarProfile" class="topbar-profile hidden" aria-live="polite"></div>
        <button id="teamBadgeButton" class="ghost-btn hidden" type="button">Team</button>
        <button id="logoutButton" class="ghost-btn hidden" type="button">Salir</button>
      </div>
    </header>

    <main id="appContent" class="app-content" aria-live="polite"></main>
  </div>

  <nav class="bottom-dock" aria-label="Accesos del juego">
    <button class="bottom-dock-link is-active" type="button" data-nav="home">
      <span>Hub</span>
      <strong>Home</strong>
    </button>
    <button class="bottom-dock-link" type="button" data-nav="adventure">
      <span>Map</span>
      <strong>Adventure</strong>
    </button>
    <button class="bottom-dock-link" type="button" data-nav="collection">
      <span>Dex</span>
      <strong>Collection</strong>
    </button>
    <button class="bottom-dock-link" type="button" data-nav="team">
      <span>Party</span>
      <strong>Team</strong>
    </button>
    <button class="bottom-dock-link" type="button" data-nav="shop">
      <span>Mart</span>
      <strong>Shop</strong>
    </button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
