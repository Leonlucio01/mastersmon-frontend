<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MastersMon Web</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="app-shell">
      <aside id="sidebar">
        <div class="brand">
          <div class="brand-logo">MM</div>
          <div>
            <h1>MastersMon</h1>
            <p>Fan game online</p>
          </div>
        </div>
        <nav id="sidebar-nav"></nav>
        <div class="sidebar-footer">
          <button id="logout-btn" class="ghost-button hidden">Cerrar sesión</button>
          <small>Frontend starter · Phaser + Vite</small>
        </div>
      </aside>

      <main id="main-layout">
        <header id="topbar">
          <div>
            <h2 id="view-title">Home</h2>
            <p id="view-subtitle">Tu hub principal de juego</p>
          </div>
          <div id="player-mini-card"></div>
        </header>

        <section id="content-grid">
          <div id="game-root"></div>
          <div id="panel-root"></div>
        </section>
      </main>
    </div>

    <div id="toast-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
