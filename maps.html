<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon World - Maps</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/maps.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <header class="menu menu-pro">
        <div class="menu-topbar">
            <h1 class="logo">Pokemon World</h1>

            <nav class="menu-nav-desktop">
                <a href="index.html" data-i18n="menu_pokedex">Pokedex</a>
                <a href="battle.html" data-i18n="menu_battle">Battle</a>
                <a href="maps.html" class="active" data-i18n="menu_maps">Maps</a>
                <a href="mypokemon.html" data-i18n="menu_my_pokemon">My Pokemon</a>
                <a href="pokemart.html" data-i18n="menu_pokemart">PokeMart</a>
                <a href="ranking.html" data-i18n="menu_ranking">Ranking</a>
            </nav>

            <div class="menu-auth-area">
                <div class="lang-switch">
                    <select id="languageSelect">
                        <option value="en">EN</option>
                        <option value="es">ES</option>
                    </select>
                </div>

                <div id="loginMenuContainer">
                    <div id="g_id_onload"
                         data-client_id="535230935122-vqqd262fjhetd408li95420bb8cas5vb.apps.googleusercontent.com"
                         data-callback="handleCredentialResponse">
                    </div>

                    <div class="g_id_signin"
                         data-type="standard"
                         data-size="medium"
                         data-theme="outline"
                         data-text="signin_with"
                         data-shape="pill"
                         data-logo_alignment="left">
                    </div>
                </div>

                <div id="usuarioMenu" class="oculto">
                    <span id="nombreUsuario"></span>
                    <button id="cerrarSesionMenu" type="button" data-i18n="menu_logout">Logout</button>
                </div>
            </div>

            <button class="menu-toggle" id="menuToggle" type="button">☰</button>
        </div>

        <div class="menu-links-mobile" id="menuMobile">
            <div class="mobile-panel">
                <a href="index.html" data-i18n="menu_pokedex">Pokedex</a>
                <a href="battle.html" data-i18n="menu_battle">Battle</a>
                <a href="maps.html" class="active" data-i18n="menu_maps">Maps</a>
                <a href="mypokemon.html" data-i18n="menu_my_pokemon">My Pokemon</a>
                <a href="pokemart.html" data-i18n="menu_pokemart">PokeMart</a>
                <a href="ranking.html" data-i18n="menu_ranking">Ranking</a>

                <div class="menu-mobile-user">
                    <div id="loginMenuContainerMobile">
                        <div class="g_id_signin"
                             data-type="standard"
                             data-size="medium"
                             data-theme="outline"
                             data-text="signin_with"
                             data-shape="pill"
                             data-logo_alignment="left">
                        </div>
                    </div>

                    <div id="usuarioMenuMobile" class="oculto">
                        <span id="nombreUsuarioMobile"></span>
                        <button id="cerrarSesionMenuMobile" type="button" data-i18n="menu_logout">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="seccion-maps">
            <div class="encabezado-maps">
                <h1 class="titulo-maps" data-i18n="maps_title">MAPS</h1>
                <p class="subtitulo-maps" data-i18n="maps_subtitle">Choose an area, enter the map, and move to find wild Pokémon</p>
            </div>

            <div class="maps-carousel-wrapper">
                <button class="maps-arrow maps-arrow-left" id="btnMapPrev" type="button" aria-label="Previous map" data-i18n-aria-label="maps_prev_map">‹</button>

                <div class="maps-carousel-viewport">
                    <div id="zonasContainer" class="maps-carousel-track"></div>
                </div>

                <button class="maps-arrow maps-arrow-right" id="btnMapNext" type="button" aria-label="Next map" data-i18n-aria-label="maps_next_map">›</button>
            </div>

            <div id="mensajeMaps" class="mensaje-maps oculto"></div>

            <div id="encuentroContainer" class="encuentro-box oculto"></div>
        </section>
    </main>

    <div id="modalShiny" class="modal-shiny oculto">
        <div class="modal-shiny-box">
            <div class="shiny-stars">✨ ✨ ✨</div>
            <h2 data-i18n="maps_shiny_title">A Shiny Pokémon appeared!</h2>
            <p data-i18n="maps_shiny_text">You found a very rare version.</p>
            <button type="button" onclick="cerrarModalShiny()" data-i18n="maps_continue">Continue</button>
        </div>
    </div>

    <div id="modalResultadoCaptura" class="modal-resultado oculto">
        <div class="modal-resultado-box" id="modalResultadoCapturaBox">
            <div class="modal-resultado-deco" id="modalResultadoCapturaDeco">✨ ✨ ✨</div>
            <h2 id="modalResultadoCapturaTitulo" data-i18n="maps_result_title">Result</h2>
            <p id="modalResultadoCapturaTexto" data-i18n="maps_result_message">Message</p>
            <button type="button" id="btnCerrarModalResultadoCaptura" data-i18n="maps_continue">Continue</button>
        </div>
    </div>

    <script src="js/api.js?v=2"></script>
    <script src="js/i18n.js?v=4"></script>
    <script src="js/gmail.js"></script>
    <script src="js/maps.js?v=5"></script>
</body>
</html>
