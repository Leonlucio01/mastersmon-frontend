<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon World - PokeMart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/pokemart.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <header class="menu menu-pro">
        <div class="menu-topbar">
            <h1 class="logo">Pokemon World</h1>

            <nav class="menu-nav-desktop">
                <a href="index.html" data-i18n="menu_pokedex">Pokedex</a>
                <a href="battle.html" data-i18n="menu_battle">Battle</a>
                <a href="maps.html" data-i18n="menu_maps">Maps</a>
                <a href="mypokemon.html" data-i18n="menu_my_pokemon">My Pokemon</a>
                <a href="pokemart.html" class="active" data-i18n="menu_pokemart">PokeMart</a>
            </nav>

            <div class="menu-auth-area">
                <div class="lang-switch">
                    <select id="languageSelect" aria-label="Language">
                        <option value="en">EN</option>
                        <option value="es">ES</option>
                    </select>
                </div>

                <div id="loginMenuContainer">
                    <div id="g_id_onload"
                         data-client_id="535230935122-vqqd262fjhetd408li95420bb8cas5vb.apps.googleusercontent.com"
                         data-callback="handleCredentialResponse">
                    </div>

                    <div class="g_id_signin"
                         data-type="standard"
                         data-size="medium"
                         data-theme="outline"
                         data-text="signin_with"
                         data-shape="pill"
                         data-logo_alignment="left">
                    </div>
                </div>

                <div id="usuarioMenu" class="oculto">
                    <span id="nombreUsuario"></span>
                    <button id="cerrarSesionMenu" type="button" data-i18n="menu_logout">Salir</button>
                </div>
            </div>

            <button class="menu-toggle" id="menuToggle" type="button">☰</button>
        </div>

        <div class="menu-links-mobile" id="menuMobile">
            <div class="mobile-panel">
                <a href="index.html" data-i18n="menu_pokedex">Pokedex</a>
                <a href="battle.html" data-i18n="menu_battle">Battle</a>
                <a href="maps.html" data-i18n="menu_maps">Maps</a>
                <a href="mypokemon.html" data-i18n="menu_my_pokemon">My Pokemon</a>
                <a href="pokemart.html" class="active" data-i18n="menu_pokemart">PokeMart</a>
                <a href="ranking.html" data-i18n="menu_ranking">Ranking</a>

                <div class="menu-mobile-user">
                    <div class="lang-switch">
                        <select id="languageSelectMobile" aria-label="Language">
                            <option value="en">EN</option>
                            <option value="es">ES</option>
                        </select>
                    </div>

                    <div id="loginMenuContainerMobile">
                        <div class="g_id_signin"
                             data-type="standard"
                             data-size="medium"
                             data-theme="outline"
                             data-text="signin_with"
                             data-shape="pill"
                             data-logo_alignment="left">
                        </div>
                    </div>

                    <div id="usuarioMenuMobile" class="oculto">
                        <span id="nombreUsuarioMobile"></span>
                        <button id="cerrarSesionMenuMobile" type="button" data-i18n="menu_logout">Salir</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="seccion-pokedex">
        <div class="encabezado-pokedex">
            <h2 class="titulo" data-i18n="pokemart_title">POKEMART</h2>
            <p class="subtitulo" data-i18n="pokemart_subtitle">Compra Poké Balls, pociones y piedras de evolución</p>
        </div>

        <div id="saldoUsuario" class="pokemart-saldo"></div>
        <div id="mensajeCompra" class="mensaje-compra oculto"></div>

        <div id="tiendaItems" class="pokemart-grid"></div>
    </section>

    <script src="js/api.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/gmail.js"></script>
    <script src="js/pokemart.js"></script>
    <script>
        const menuToggle = document.getElementById("menuToggle");
        const menuMobile = document.getElementById("menuMobile");

        if (menuToggle && menuMobile) {
            menuToggle.addEventListener("click", () => {
                menuMobile.classList.toggle("menu-open");
            });
        }
    </script>

</body>
</html>
